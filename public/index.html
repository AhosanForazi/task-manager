<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b1020" />
  <title>Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@500&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="app">
    <!-- ───────── Hero header ───────── -->
    <header class="hero">
      <div class="hero-top">
        <h1 class="brand-title">Today, <em>shipped.</em></h1>

        <div class="hero-actions">
          <button class="icon-btn" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">
            <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="4" />
              <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
            </svg>
            <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg>
          </button>
          <button class="btn btn-primary btn-cta" id="btn-new-task">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 5v14M5 12h14" />
            </svg>
            <span>New task</span>
            <kbd class="kbd">N</kbd>
          </button>
        </div>
      </div>

      <!-- Filter pills + search, on the same row -->
      <div class="filters-row" aria-label="Filter tasks">
        <div class="pill-group" role="tablist" aria-label="Filter by status">
          <button class="pill is-active" data-stat="all" role="tab" aria-selected="true">
            <span class="pill-label">All</span>
            <span class="pill-count" id="stat-total">0</span>
          </button>
          <button class="pill" data-stat="pending" role="tab" aria-selected="false">
            <span class="pill-dot pill-dot-pending" aria-hidden="true"></span>
            <span class="pill-label">Pending</span>
            <span class="pill-count" id="stat-pending">0</span>
          </button>
          <button class="pill" data-stat="in_progress" role="tab" aria-selected="false">
            <span class="pill-dot pill-dot-progress" aria-hidden="true"></span>
            <span class="pill-label">In progress</span>
            <span class="pill-count" id="stat-progress">0</span>
          </button>
          <button class="pill" data-stat="done" role="tab" aria-selected="false">
            <span class="pill-dot pill-dot-done" aria-hidden="true"></span>
            <span class="pill-label">Done</span>
            <span class="pill-count" id="stat-done">0</span>
          </button>
        </div>

        <div class="search-wrap">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="7" />
            <path d="M21 21l-4.35-4.35" />
          </svg>
          <input id="search" type="search" placeholder="Search…" autocomplete="off" />
          <kbd class="kbd kbd-inline">⌘ K</kbd>
        </div>
      </div>
    </header>

    <!-- ───────── Task grid ───────── -->
    <main class="task-grid" id="task-grid" aria-live="polite"></main>
  </div>

  <!-- ───────── Task modal (create / edit) ───────── -->
  <div class="modal" id="task-modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <header class="modal-head">
        <div>
          <p class="eyebrow" id="modal-eyebrow">New entry</p>
          <h2 id="modal-title">New task</h2>
        </div>
        <button class="icon-btn" data-close aria-label="Close">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6L6 18M6 6l12 12" />
          </svg>
        </button>
      </header>

      <form id="task-form" class="modal-body" novalidate>
        <input type="hidden" id="f-id" />

        <label class="field">
          <span class="field-label">Title <em>*</em></span>
          <input id="f-title" name="title" type="text" maxlength="255" placeholder="e.g. Ship the new landing page" required />
          <span class="field-error" data-error-for="title"></span>
        </label>

        <label class="field">
          <span class="field-label">Description</span>
          <textarea id="f-description" name="description" maxlength="2000" rows="3" placeholder="Optional details…"></textarea>
          <span class="field-meta"><span id="char-count">0</span>/2000</span>
          <span class="field-error" data-error-for="description"></span>
        </label>

        <div class="field">
          <span class="field-label">Status</span>
          <div class="seg-control" role="radiogroup" aria-label="Status">
            <input type="radio" id="s-pending" name="status" value="pending" />
            <label for="s-pending" class="seg-option">
              <span class="dot dot-pending"></span> Pending
            </label>
            <input type="radio" id="s-progress" name="status" value="in_progress" />
            <label for="s-progress" class="seg-option">
              <span class="dot dot-progress"></span> In progress
            </label>
            <input type="radio" id="s-done" name="status" value="done" />
            <label for="s-done" class="seg-option">
              <span class="dot dot-done"></span> Done
            </label>
          </div>
          <span class="field-error" data-error-for="status"></span>
        </div>

        <footer class="modal-foot">
          <button type="button" class="btn btn-ghost" data-close>Cancel</button>
          <button type="submit" class="btn btn-primary" id="modal-submit">Create task</button>
        </footer>
      </form>
    </div>
  </div>

  <!-- ───────── Confirm modal ───────── -->
  <div class="modal" id="confirm-modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card modal-card-sm" role="alertdialog" aria-modal="true" aria-labelledby="confirm-title">
      <header class="modal-head">
        <div>
          <p class="eyebrow eyebrow-danger">Heads up</p>
          <h2 id="confirm-title">Delete task?</h2>
        </div>
      </header>
      <div class="modal-body">
        <p class="confirm-msg">This will permanently delete <strong id="confirm-target"></strong>. This action can't be undone.</p>
      </div>
      <footer class="modal-foot">
        <button type="button" class="btn btn-ghost" data-close>Cancel</button>
        <button type="button" class="btn btn-danger" id="confirm-ok">Delete</button>
      </footer>
    </div>
  </div>

  <!-- ───────── Toast container ───────── -->
  <div class="toast-stack" id="toast-stack" aria-live="polite" aria-atomic="true"></div>

  <script src="/app.js" defer></script>
</body>
</html>
